<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ethical AI Writing Assistant (B2 Level)</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React and ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for JSX transformation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-in {
            animation: fadeIn 0.4s ease-out forwards;
        }

        /* Flashcard Flip Animation Styles */
        .perspective-1000 {
            perspective: 1000px;
        }
        .preserve-3d {
            transform-style: preserve-3d;
        }
        .backface-hidden {
            backface-visibility: hidden;
        }
        .rotate-y-180 {
            transform: rotateY(180deg);
        }
    </style>
</head>
<body class="bg-gray-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // --- INLINE ICONS ---
        const IconShieldCheck = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10"/><path d="m9 12 2 2 4-4"/></svg>
        );
        const IconAlertTriangle = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg>
        );
        const IconXCircle = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="m15 9-6 6"/><path d="m9 9 6 6"/></svg>
        );
        const IconCheckCircle2 = ({ size = 24 }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"/><path d="m9 12 2 2 4-4"/></svg>
        );
        const IconInfo = ({ size = 24 }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
        );
        const IconBookOpen = ({ size = 18 }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
        );
        const IconScale = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m16 16 3-8 3 8c-.87.65-1.92 1-3 1s-2.13-.35-3-1Z"/><path d="m2 16 3-8 3 8c-.87.65-1.92 1-3 1s-2.13-.35-3-1Z"/><path d="M7 21h10"/><path d="M12 3v18"/><path d="M3 7h2c2 0 5-1 7-2 2 1 5 2 7 2h2"/></svg>
        );
        const IconChevronRight = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m9 18 6-6-6-6"/></svg>
        );
        const IconRotateCcw = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
        );
        const IconExternalLink = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        );

        // --- APP DATA ---
        const tiers = [
            {
                id: 0,
                name: "Tier 1: Acceptable (Safe)",
                status: "Good to Use",
                color: "bg-green-600",
                lightColor: "bg-green-50",
                borderColor: "border-green-200",
                textColor: "text-green-700",
                icon: <IconShieldCheck />,
                description: "Using AI to improve the language and structure of your own writing without adding new ideas.",
                applications: [
                    { title: "Grammar & Spelling", desc: "Using AI to fix small errors like typos." },
                    { title: "Readability", desc: "Making your own sentences clearer and easier to read." },
                    { title: "Translation", desc: "Changing your own writing into English from your native language." }
                ],
                keyConsideration: "The final text must still sound like your own voice and ideas.",
                details: [
                    "Mainly for fixing grammar and the 'flow' of sentences.",
                    "Best for translating ideas you have already thought of.",
                    "You must check the output for small mistakes in meaning.",
                    "Don't let the AI do the deep thinking for you."
                ]
            },
            {
                id: 1,
                name: "Tier 2: Use with Care",
                status: "Proceed with Caution",
                color: "bg-amber-500",
                lightColor: "bg-amber-50",
                borderColor: "border-amber-200",
                textColor: "text-amber-700",
                icon: <IconInfo />,
                description: "This is okay only if you carefully check the AI output and manage your own ideas correctly.",
                applications: [
                    { title: "Making Outlines", desc: "Using AI to organize your own rough notes into a plan." },
                    { title: "Summarizing", desc: "Asking AI to condense long texts into shorter points." },
                    { title: "Brainstorming", desc: "Asking AI for different ways to look at a topic." }
                ],
                keyConsideration: "Ensure the final work shows your ideas and check for AI 'hallucinations' (made-up facts).",
                details: [
                    "Good for getting different points of view on a topic.",
                    "Works best if you give the AI your own information first.",
                    "You must give credit (cite) if you use a new idea from AI.",
                    "Make sure the AI doesn't change your original meaning."
                ]
            },
            {
                id: 2,
                name: "Tier 3: Risky (Avoid)",
                status: "Not Recommended",
                color: "bg-red-600",
                lightColor: "bg-red-50",
                borderColor: "border-red-200",
                textColor: "text-red-700",
                icon: <IconXCircle />,
                description: "These tasks lead to plagiarism or false information. They stop you from learning how to think for yourself.",
                applications: [
                    { title: "Drafting from Scratch", desc: "Asking AI to write whole paragraphs without your ideas." },
                    { title: "Interpreting Data", desc: "Letting AI explain your research results for you." },
                    { title: "Literature Reviews", desc: "Using AI to find sources (it often makes them up)." }
                ],
                keyConsideration: "AI should never replace your own intellectual work or your deep thinking.",
                details: [
                    "High risk of fake citations (AI hallucinations).",
                    "Relying on AI stops you from truly understanding your research.",
                    "AI can have hidden biases (prejudices) from its training data.",
                    "Copying verbatim (word-for-word) is academic misconduct."
                ]
            }
        ];

        const corePrinciples = [
            { title: "Your Own Ideas", desc: "Are the main points and analysis really yours?" },
            { title: "Learning Your Skills", desc: "Does using AI help you learn, or just save time?" },
            { title: "Checking for Mistakes", desc: "Did you verify all facts and references manually?" },
            { title: "Being Honest (Transparency)", desc: "Did you explain exactly how you used AI in your paper?" }
        ];

        const quizScenarios = [
            {
                scenario: "Sarah used ChatGPT to find 10 academic sources for her paper. She included them without checking if they were real because they looked correct.",
                correctTier: 2,
                explanation: "This is Risky (Tier 3). AI often 'hallucinates' (invents) fake sources. You must always check every reference yourself."
            },
            {
                scenario: "David wrote a rough draft of his methods. He used AI to fix his grammar and make the sentences sound more professional while keeping his meaning.",
                correctTier: 0,
                explanation: "This is Acceptable (Tier 1). The AI is just helping with the language, not the content or the research ideas."
            },
            {
                scenario: "Li gave his research data to an AI and asked it to 'Explain what these results mean and write the conclusion for me.'",
                correctTier: 2,
                explanation: "This is Risky (Tier 3). Explaining your results is a key part of being a researcher. If the AI does it, it isn't your own work."
            },
            {
                scenario: "Aisha had many rough notes. She asked AI to 'Organize these notes into a clear plan (outline)' so she could start writing her first draft.",
                correctTier: 1,
                explanation: "This is Tier 2 (Use with Care). It is okay if the outline is based on your own notes, but you must check that the AI didn't change your message."
            },
            {
                scenario: "Maria used an AI tool to translate her draft from her native language into English to submit it to a journal.",
                correctTier: 0,
                explanation: "This is Tier 1 (Acceptable). Translating your own ideas is okay, but you should still check that the translation is accurate."
            },
            {
                scenario: "Tom used AI to find 'counter-arguments' (opposing views) for his paper. He then wrote about these views in his own words.",
                correctTier: 1,
                explanation: "This is Tier 2 (Use with Care). Using AI for brainstorming is helpful, as long as you write the final text yourself and check the facts."
            },
            {
                scenario: "Elena used AI to rewrite her paragraphs several times so that a plagiarism checker wouldn't find matches with her source material.",
                correctTier: 2,
                explanation: "This is Risky (Tier 3). Using AI to hide the fact that you copied someone else is dishonest and counts as misconduct."
            },
            {
                scenario: "Kevin asked the AI to 'create a new theory' for his paper because he didn't have enough original ideas.",
                correctTier: 2,
                explanation: "This is Risky (Tier 3). Creating theories and concepts is your job as an author. AI cannot replace your own thinking."
            }
        ];

        // --- FLASHCARD COMPONENT ---
        const Flashcard = ({ tier }) => {
            const [isFlipped, setIsFlipped] = useState(false);

            return (
                <div 
                    className="md:w-72 h-64 perspective-1000 cursor-pointer group"
                    onClick={() => setIsFlipped(!isFlipped)}
                >
                    <div className={`relative w-full h-full transition-transform duration-500 preserve-3d ${isFlipped ? 'rotate-y-180' : ''}`}>
                        
                        {/* Front Side */}
                        <div className="absolute w-full h-full backface-hidden bg-white/70 p-6 rounded-xl border border-white flex flex-col justify-center items-center text-center shadow-sm">
                            <div className="bg-amber-100 p-3 rounded-full mb-3 text-amber-600">
                                <IconAlertTriangle size={24} />
                            </div>
                            <h4 className="text-sm font-bold text-slate-800 uppercase mb-2">Key Consideration</h4>
                            <p className="text-sm italic text-slate-600 leading-snug">
                                "{tier.keyConsideration}"
                            </p>
                            <span className="mt-4 text-[10px] text-slate-400 font-bold uppercase tracking-widest group-hover:text-blue-500 transition-colors">Click to see more</span>
                        </div>

                        {/* Back Side */}
                        <div className="absolute w-full h-full backface-hidden rotate-y-180 bg-white p-6 rounded-xl border-2 border-blue-100 flex flex-col justify-center shadow-md">
                            <h4 className="text-xs font-bold text-blue-600 uppercase mb-3 flex items-center gap-2">
                                <IconInfo size={14} />
                                Why this matters
                            </h4>
                            <ul className="space-y-2">
                                {tier.details.map((detail, i) => (
                                    <li key={i} className="flex gap-2 text-[11px] text-slate-600 leading-tight">
                                        <span className="text-blue-400 font-bold">•</span>
                                        {detail}
                                    </li>
                                ))}
                            </ul>
                            <span className="mt-4 text-[10px] text-center text-slate-400 font-bold uppercase tracking-widest group-hover:text-amber-500 transition-colors">Click to go back</span>
                        </div>

                    </div>
                </div>
            );
        };

        // --- MAIN APP COMPONENT ---
        const App = () => {
            const [activeTab, setActiveTab] = useState('tiers');
            const [selectedTier, setSelectedTier] = useState(0);
            const [quizState, setQuizState] = useState({
                currentQuestion: 0,
                score: 0,
                showFeedback: false,
                selectedAnswer: null,
                isComplete: false
            });

            const handleAnswer = (tierIndex) => {
                if (quizState.showFeedback) return;
                setQuizState(prev => ({
                    ...prev,
                    selectedAnswer: tierIndex,
                    showFeedback: true,
                    score: tierIndex === quizScenarios[prev.currentQuestion].correctTier ? prev.score + 1 : prev.score
                }));
            };

            const nextQuestion = () => {
                if (quizState.currentQuestion < quizScenarios.length - 1) {
                    setQuizState(prev => ({
                        ...prev,
                        currentQuestion: prev.currentQuestion + 1,
                        showFeedback: false,
                        selectedAnswer: null
                    }));
                } else {
                    setQuizState(prev => ({ ...prev, isComplete: true }));
                }
            };

            const resetQuiz = () => {
                setQuizState({
                    currentQuestion: 0,
                    score: 0,
                    showFeedback: false,
                    selectedAnswer: null,
                    isComplete: false
                });
            };

            return (
                <div className="min-h-screen p-4 md:p-8">
                    <div className="max-w-4xl mx-auto bg-white rounded-2xl shadow-xl overflow-hidden border border-slate-200">
                        
                        {/* Header */}
                        <header className="bg-slate-900 text-white p-6 md:p-8">
                            <div className="flex flex-col gap-1 mb-4">
                                <div className="flex items-center gap-3">
                                    <IconScale className="text-blue-400" />
                                    <h1 className="text-2xl md:text-3xl font-bold tracking-tight">Ethical AI Writing Assistant</h1>
                                </div>
                                <p className="text-slate-400 text-sm ml-1 md:ml-11 font-medium">(Created with Gemini Pro, Hamid Guedra)</p>
                            </div>
                            <p className="text-slate-300 max-w-2xl leading-relaxed text-sm md:text-base">
                                Based on <span className="text-slate-200 italic font-medium">Cheng, Calhoun, & Reedy. 2025. Artificial intelligence-assisted academic writing: recommendations for ethical use.</span>
                            </p>
                        </header>

                        {/* Navigation */}
                        <nav className="flex border-b border-slate-200 bg-slate-50">
                            {['tiers', 'principles', 'quiz'].map((tab) => (
                                <button 
                                    key={tab}
                                    onClick={() => setActiveTab(tab)}
                                    className={`flex-1 py-4 px-2 text-xs md:text-sm font-semibold transition-all ${activeTab === tab ? 'text-blue-600 border-b-2 border-blue-600 bg-white' : 'text-slate-500 hover:bg-slate-100'}`}
                                >
                                    {tab === 'tiers' ? 'Ethical Tiers' : tab === 'principles' ? 'The 4 Principles' : 'Scenario Challenge'}
                                </button>
                            ))}
                        </nav>

                        {/* Main Content Area */}
                        <main className="p-6 md:p-8 min-h-[500px]">
                            
                            {activeTab === 'tiers' && (
                                <div className="space-y-8 animate-in">
                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                        {tiers.map((t, idx) => (
                                            <button
                                                key={t.id}
                                                onClick={() => setSelectedTier(idx)}
                                                className={`p-4 rounded-xl border-2 transition-all text-left ${selectedTier === idx ? `${t.borderColor} ${t.lightColor} shadow-md` : 'border-transparent bg-white hover:bg-slate-50'}`}
                                            >
                                                <div className={`w-10 h-10 rounded-lg flex items-center justify-center mb-3 ${t.color} text-white`}>
                                                    {t.icon}
                                                </div>
                                                <h3 className="font-bold text-sm leading-tight mb-1">{t.name}</h3>
                                                <span className={`text-[10px] font-bold uppercase tracking-wider px-2 py-0.5 rounded-full bg-white border ${t.borderColor} ${t.textColor}`}>
                                                    {t.status}
                                                </span>
                                            </button>
                                        ))}
                                    </div>

                                    <div className={`p-6 rounded-2xl border-2 transition-all ${tiers[selectedTier].borderColor} ${tiers[selectedTier].lightColor}`}>
                                        <div className="flex flex-col md:flex-row gap-8 items-start">
                                            <div className="flex-1">
                                                <h2 className={`text-2xl font-bold mb-2 ${tiers[selectedTier].textColor}`}>{tiers[selectedTier].name}</h2>
                                                <p className="text-slate-700 leading-relaxed mb-6">
                                                    {tiers[selectedTier].description}
                                                </p>
                                                
                                                <h4 className="text-xs font-bold uppercase tracking-widest text-slate-400 mb-3">Common Tasks</h4>
                                                <div className="grid grid-cols-1 gap-3">
                                                    {tiers[selectedTier].applications.map((app, i) => (
                                                        <div key={i} className="flex items-start gap-3 bg-white p-3 rounded-lg border border-slate-200 shadow-sm">
                                                            <div className={`p-2 rounded bg-slate-50 ${tiers[selectedTier].textColor}`}>
                                                                <IconBookOpen />
                                                            </div>
                                                            <div>
                                                                <p className="font-bold text-sm text-slate-800">{app.title}</p>
                                                                <p className="text-xs text-slate-500">{app.desc}</p>
                                                            </div>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                            
                                            {/* Flashcard Side Component */}
                                            <Flashcard tier={tiers[selectedTier]} />
                                        </div>
                                    </div>
                                </div>
                            )}

                            {activeTab === 'principles' && (
                                <div className="space-y-8 animate-in">
                                    <div className="text-center mb-8">
                                        <h2 className="text-2xl font-bold mb-2">Author Checklist</h2>
                                        <p className="text-slate-500">Ask yourself these four questions to check your work.</p>
                                    </div>

                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                        {corePrinciples.map((p, idx) => (
                                            <div key={idx} className="flex gap-4 p-5 rounded-xl bg-slate-50 border border-slate-200 hover:border-blue-200 transition-colors group">
                                                <div className="w-10 h-10 shrink-0 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center font-bold text-lg group-hover:bg-blue-600 group-hover:text-white transition-colors">
                                                    {idx + 1}
                                                </div>
                                                <div>
                                                    <h3 className="font-bold text-slate-800 mb-1">{p.title}</h3>
                                                    <p className="text-sm text-slate-600 leading-relaxed">{p.desc}</p>
                                                </div>
                                            </div>
                                        ))}
                                    </div>

                                    <div className="mt-8 p-6 bg-amber-50 border border-amber-200 rounded-2xl flex items-start gap-4">
                                        <div className="bg-amber-100 p-2 rounded-full text-amber-600 shrink-0">
                                            <IconInfo size={24} />
                                        </div>
                                        <div>
                                            <h4 className="font-bold text-amber-900 mb-1">A Note on Being Honest (Transparency)</h4>
                                            <p className="text-sm text-amber-800 leading-relaxed">
                                                If you use AI, you must always explain how you used it. You should write this in the <strong>Methods</strong> or <strong>Acknowledgements</strong> section of your paper.
                                            </p>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {activeTab === 'quiz' && (
                                <div className="animate-in max-w-2xl mx-auto">
                                    {!quizState.isComplete ? (
                                        <>
                                            <div className="flex justify-between items-center mb-6">
                                                <span className="text-xs font-bold uppercase tracking-widest text-slate-400">Scenario {quizState.currentQuestion + 1} of {quizScenarios.length}</span>
                                                <span className="text-xs font-bold bg-blue-100 text-blue-700 px-3 py-1 rounded-full">Score: {quizState.score}</span>
                                            </div>

                                            <div className="bg-slate-50 p-6 rounded-2xl border border-slate-200 mb-8 shadow-sm">
                                                <h3 className="text-lg font-semibold text-slate-800 leading-relaxed italic">
                                                    "{quizScenarios[quizState.currentQuestion].scenario}"
                                                </h3>
                                            </div>

                                            <div className="space-y-3">
                                                {tiers.map((t, idx) => {
                                                    const isSelected = quizState.selectedAnswer === idx;
                                                    const isCorrect = idx === quizScenarios[quizState.currentQuestion].correctTier;
                                                    
                                                    let btnClass = "w-full p-4 rounded-xl border-2 text-left font-bold transition-all flex items-center justify-between ";
                                                    
                                                    if (!quizState.showFeedback) {
                                                        btnClass += "bg-white border-slate-200 hover:border-blue-400 hover:bg-blue-50";
                                                    } else {
                                                        if (isCorrect) btnClass += "bg-green-50 border-green-500 text-green-700";
                                                        else if (isSelected) btnClass += "bg-red-50 border-red-500 text-red-700";
                                                        else btnClass += "bg-white border-slate-100 opacity-50";
                                                    }

                                                    return (
                                                        <button key={idx} onClick={() => handleAnswer(idx)} className={btnClass}>
                                                            {t.name}
                                                            {quizState.showFeedback && isCorrect && <IconCheckCircle2 size={20} />}
                                                        </button>
                                                    );
                                                })}
                                            </div>

                                            {quizState.showFeedback && (
                                                <div className="mt-8">
                                                    <div className={`p-5 rounded-xl border-l-4 ${quizState.selectedAnswer === quizScenarios[quizState.currentQuestion].correctTier ? 'bg-green-50 border-green-500' : 'bg-red-50 border-red-500'}`}>
                                                        <p className="text-sm leading-relaxed text-slate-700">
                                                            {quizScenarios[quizState.currentQuestion].explanation}
                                                        </p>
                                                    </div>
                                                    <button 
                                                        onClick={nextQuestion}
                                                        className="mt-6 w-full bg-slate-900 text-white p-4 rounded-xl font-bold flex items-center justify-center gap-2 hover:bg-slate-800 transition-colors"
                                                    >
                                                        {quizState.currentQuestion < quizScenarios.length - 1 ? 'Next Scenario' : 'See Results'}
                                                        <IconChevronRight />
                                                    </button>
                                                </div>
                                            )}
                                        </>
                                    ) : (
                                        <div className="text-center py-12">
                                            <div className="w-20 h-20 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-6">
                                                <IconCheckCircle2 size={40} />
                                            </div>
                                            <h2 className="text-3xl font-bold mb-2">Quiz Complete!</h2>
                                            <p className="text-slate-500 mb-8">You scored {quizState.score} out of {quizScenarios.length}</p>
                                            
                                            <div className="bg-slate-50 p-6 rounded-2xl text-left border border-slate-200 mb-8">
                                                <h4 className="font-bold text-slate-800 mb-2 flex items-center gap-2">
                                                    <IconBookOpen />
                                                    Summary
                                                </h4>
                                                <p className="text-sm text-slate-600 leading-relaxed mb-4">
                                                    AI is a <strong>tool</strong> to help you work better. It should not <strong>replace</strong> your own thinking. Using AI for high-level research tasks is risky and can damage the quality of science.
                                                </p>
                                                <a 
                                                    href="https://doi.org/10.1186/s41077-025-00350-6" 
                                                    target="_blank"
