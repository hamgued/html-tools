<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Capstone Project Navigator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .step-content { display: none; }
        .step-content.active { display: block; }
        .nav-item.active { 
            background-color: #f0f7ff; 
            color: #1e40af; 
            border-right: 4px solid #1e40af; 
        }
        .ai-card.selected {
            border-color: #4f46e5;
            background-color: #f5f3ff;
            ring: 2px solid #c7d2fe;
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed !important;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">

<div class="flex flex-col md:flex-row min-h-screen">
    <!-- Sidebar -->
    <aside id="sidebar" class="w-full md:w-72 bg-white border-r border-slate-200 flex flex-col fixed md:sticky top-0 h-auto md:h-screen z-50 transition-transform duration-300">
        <div class="p-6 border-b border-slate-100 flex justify-between items-center">
            <div>
                <h1 class="text-xl font-bold text-indigo-900">Capstone Guide</h1>
                <p class="text-xs text-slate-400 font-medium">Writing for Digital Media</p>
            </div>
            <button onclick="toggleSidebar()" class="md:hidden text-slate-400">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            </button>
        </div>

        <nav id="nav-list" class="flex-1 overflow-y-auto py-4">
            <!-- Nav items generated by JS -->
        </nav>

        <div class="p-6 border-t border-slate-100 bg-slate-50">
            <div class="text-xs font-semibold text-slate-400 mb-2 uppercase tracking-wider">Active Mode</div>
            <div id="active-mode-display" class="flex items-center gap-2">
                <span class="text-sm text-slate-500 italic">Please select in Step 1</span>
            </div>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 p-6 md:p-12 overflow-y-auto">
        <div class="max-w-3xl mx-auto">
            <!-- Header -->
            <div class="mb-8">
                <div id="step-counter" class="text-indigo-600 font-bold text-xs uppercase tracking-widest mb-2">Step 1 of 9</div>
                <h2 id="step-title" class="text-3xl font-extrabold text-slate-900 tracking-tight">Background & AI Choice</h2>
            </div>

            <!-- Content Container -->
            <div id="content-area" class="bg-white rounded-2xl shadow-sm border border-slate-200 p-8 min-h-[400px]">
                <!-- Steps rendered here -->
            </div>

            <!-- Navigation Buttons -->
            <div class="mt-8 pt-8 border-t border-slate-200 flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <button id="prev-btn" onclick="prevStep()" class="flex items-center gap-2 px-4 py-2 text-sm font-bold text-slate-300 cursor-not-allowed transition-all">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="rotate-180"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
                        Previous Step
                    </button>
                    <div class="relative group">
                        <button id="next-btn" onclick="nextStep()" class="flex items-center gap-2 bg-indigo-600 text-white px-6 py-2.5 rounded-lg text-sm font-bold hover:bg-indigo-700 shadow-sm transition-all active:scale-95">
                            Next Step
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
                        </button>
                        <!-- Tooltip for locked state -->
                        <div id="next-tooltip" class="absolute bottom-full mb-2 left-1/2 -translate-x-1/2 px-3 py-1 bg-slate-800 text-white text-xs rounded opacity-0 pointer-events-none transition-opacity group-hover:opacity-100 whitespace-nowrap">
                            Select an AI option to continue
                        </div>
                    </div>
                    <div id="completion-badge" class="hidden text-sm font-bold text-green-600 flex items-center gap-2 ml-2">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="7"></circle><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"></polyline></svg>
                        All steps viewed!
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>

<script>
    let currentStep = 0;
    let aiOption = null;

    const steps = [
        {
            title: "Background & AI Choice",
            icon: `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>`,
            content: `
                <div class="space-y-6">
                    <p class="text-slate-600">Objective: Create a website for an imaginary organization serving university students. You'll produce content, promote the site, and engage in peer feedback.</p>
                    
                    <div class="rounded-xl overflow-hidden border border-slate-200 shadow-sm bg-white p-2">
                        <img src="wdm_journey.jpg" alt="WDM Project Journey" class="w-full h-auto rounded-lg" onerror="this.parentElement.style.display='none'">
                        <p class="text-[10px] text-slate-400 mt-2 text-center uppercase tracking-widest">Project Roadmap & Timeline</p>
                    </div>

                    <div class="bg-blue-50 border-l-4 border-blue-500 p-4 rounded-r-lg">
                        <h4 class="font-bold text-blue-800 mb-2">Crucial First Step</h4>
                        <p class="text-sm text-blue-700">Choose your path. You cannot change this later as criteria and workloads differ.</p>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-6">
                        <button onclick="selectAI('without_ai')" id="btn-manual" class="p-6 border-2 rounded-xl transition-all text-left border-slate-200 hover:border-indigo-300">
                            <div class="flex justify-between items-start mb-2">
                                <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 text-slate-400" id="icon-manual" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                            </div>
                            <h3 class="font-bold text-lg">Option 1: Without AI</h3>
                            <p class="text-sm text-slate-500 mt-2">Generate all content yourself. Use only basic grammar checkers.</p>
                        </button>
                        <button onclick="selectAI('with_ai')" id="btn-ai" class="p-6 border-2 rounded-xl transition-all text-left border-slate-200 hover:border-purple-300">
                            <div class="flex justify-between items-start mb-2">
                                <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 text-slate-400" id="icon-ai" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="10" rx="2"></rect><circle cx="12" cy="5" r="2"></circle><path d="M12 7v4"></path><line x1="8" y1="16" x2="8" y2="16"></line><line x1="16" y1="16" x2="16" y2="16"></line></svg>
                            </div>
                            <h3 class="font-bold text-lg">Option 2: With AI</h3>
                            <p class="text-sm text-slate-500 mt-2">Required to use AI. Requires documentation and reflection reports.</p>
                        </button>
                    </div>
                </div>
            `
        },
        {
            title: "1. Customer Personas",
            icon: `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>`,
            content: `<div class="space-y-4">
                <p>Develop <strong>three audience/customer personas</strong> to identify your main target groups (university students).</p>
                <ul class="list-disc pl-5 space-y-2 text-slate-600">
                    <li>What are their goals?</li>
                    <li>What challenges do they face?</li>
                    <li>How does your service help them?</li>
                </ul>
            </div>`
        },
        {
            title: "2. Website Setup",
            icon: `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line></svg>`,
            content: `<div class="space-y-4">
                <p>Set up a <strong>Google Sites</strong> website (recommended) or another platform.</p>
                <div class="p-4 bg-amber-50 rounded-lg text-sm text-amber-800">
                    <strong>Note:</strong> Focus on making the site visually engaging within the platform's limitations.
                </div>
            </div>`
        },
        {
            title: "3. Page 1: About Us",
            icon: `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>`,
            content: `<div class="space-y-4">
                <h4 class="font-bold">Content Requirements:</h4>
                <ul class="list-disc pl-5 space-y-2 text-slate-600">
                    <li><strong>Origin Story:</strong> Write a short history (~400 words).</li>
                    <li><strong>Narrative Style:</strong> Include at least one challenge overcome.</li>
                    <li><strong>Visual:</strong> Include a timeline showing 6-8 key dates.</li>
                </ul>
            </div>`
        },
        {
            title: "4. Promotion & Product",
            icon: `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"></path><line x1="3" y1="6" x2="21" y2="6"></line><path d="M16 10a4 4 0 0 1-8 0"></path></svg>`,
            content: `<div class="space-y-4">
                <div class="bg-indigo-600 text-white p-4 rounded-lg">
                    <h4 class="font-bold mb-1">Social Task 1 & 2</h4>
                    <p class="text-sm opacity-90">Start a discussion thread and post Message 1 (Site Live) and Message 2 (Product Update).</p>
                </div>
                <h4 class="font-bold mt-4 underline">Page 2: Product/Service</h4>
                <ul class="list-disc pl-5 space-y-2 text-slate-600">
                    <li><strong>Description:</strong> Intro to product features (size, price, etc.) (~400 words).</li>
                    <li><strong>Persuasion:</strong> Make a claim and support it with evidence.</li>
                    <li><strong>Visual:</strong> Include relevant images.</li>
                </ul>
            </div>`
        },
        {
            title: "5. Page 3: How-to-Use",
            icon: `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>`,
            content: `<div class="space-y-4">
                <h4 class="font-bold">Content Requirements:</h4>
                <ul class="list-disc pl-5 space-y-2 text-slate-600">
                    <li><strong>Written Guide:</strong> Instructions on how to order/use (~400 words).</li>
                    <li><strong>Video:</strong> Record a 3-4 minute presentation (screen recording OK).</li>
                    <li><strong>Captions:</strong> Embed via YouTube and manually edit auto-captions for accuracy.</li>
                </ul>
                <div class="bg-slate-100 p-3 rounded text-sm italic">
                    "Message 3: Post in your promotional thread about this update."
                </div>
            </div>`
        },
        {
            title: "6. Page 4: Data Results",
            icon: `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg>`,
            content: `<div class="space-y-4">
                <h4 class="font-bold">Process:</h4>
                <ol class="list-decimal pl-5 space-y-2 text-slate-600">
                    <li>Create a Google Form (3-5 questions).</li>
                    <li>Collect data from at least <strong>15 participants</strong>.</li>
                    <li>Write a <strong>Data Commentary</strong> (~400 words) discussing the results.</li>
                    <li>Include <strong>graphs</strong> based on the data.</li>
                </ol>
                <div class="bg-slate-100 p-3 rounded text-sm italic">
                    "Message 4: Post the final promotional update."
                </div>
            </div>`
        },
        {
            title: "7. Peer Feedback",
            icon: `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"></circle><circle cx="6" cy="12" r="3"></circle><circle cx="18" cy="19" r="3"></circle><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line></svg>`,
            content: `<div class="space-y-4">
                <p>Give feedback to at least <strong>3 peers</strong> using the "Feedback Sandwich" method:</p>
                <div class="space-y-2">
                    <div class="p-2 bg-green-50 border-l-4 border-green-500 text-sm">1. <strong>Positive:</strong> What they did well.</div>
                    <div class="p-2 bg-orange-50 border-l-4 border-orange-500 text-sm">2. <strong>Constructive:</strong> Specific, actionable improvements.</div>
                    <div class="p-2 bg-green-50 border-l-4 border-green-500 text-sm">3. <strong>Encouragement:</strong> Final positive note.</div>
                </div>
            </div>`
        },
        {
            title: "Final Submission",
            icon: `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="7"></circle><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"></polyline></svg>`,
            content: `
                <div id="checklist-container" class="space-y-4">
                    <h4 class="font-bold text-lg">Submission Checklist (PDF):</h4>
                    <div id="checklist-items" class="grid grid-cols-1 gap-2">
                        <!-- Checklist items generated by JS based on AI option -->
                    </div>
                    <div id="ai-bonus-info" class="hidden mt-4 p-4 border border-purple-200 bg-purple-50 rounded-lg">
                        <h5 class="font-bold text-purple-800 flex items-center gap-2">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="10" rx="2"></rect><circle cx="12" cy="5" r="2"></circle><path d="M12 7v4"></path></svg>
                            AI Path Requirements
                        </h5>
                        <p class="text-xs text-purple-700 mt-1">Don't forget to include screenshots of your prompts in the final PDF!</p>
                    </div>
                </div>
            `
        }
    ];

    function renderNav() {
        const navList = document.getElementById('nav-list');
        navList.innerHTML = steps.map((step, idx) => {
            const isLocked = currentStep === 0 && !aiOption && idx > 0;
            return `
            <button 
                onclick="${isLocked ? '' : `goToStep(${idx})`}" 
                class="nav-item w-full flex items-center gap-3 px-6 py-3 text-sm font-medium transition-colors ${currentStep === idx ? 'active' : 'text-slate-500 hover:text-slate-700 hover:bg-slate-50'} ${isLocked ? 'opacity-50 cursor-not-allowed' : ''}"
                ${isLocked ? 'disabled' : ''}
            >
                <div class="${currentStep === idx ? 'text-indigo-600' : 'text-slate-400'}">${step.icon}</div>
                <span class="truncate">${step.title}</span>
            </button>
        `}).join('');
    }

    function renderContent() {
        const area = document.getElementById('content-area');
        const title = document.getElementById('step-title');
        const counter = document.getElementById('step-counter');
        
        title.innerText = steps[currentStep].title;
        counter.innerText = `Step ${currentStep + 1} of ${steps.length}`;
        area.innerHTML = steps[currentStep].content;

        // Append AI/Manual Tip if not on first or last step
        if (aiOption && currentStep > 0 && currentStep < steps.length - 1) {
            const tipDiv = document.createElement('div');
            const isAI = aiOption === 'with_ai';
            tipDiv.className = `mt-10 p-5 rounded-xl border ${isAI ? 'bg-purple-50 border-purple-100' : 'bg-slate-50 border-slate-100'}`;
            tipDiv.innerHTML = `
                <h5 class="flex items-center gap-2 font-bold mb-3 ${isAI ? 'text-purple-700' : 'text-slate-700'}">
                    ${isAI ? '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="10" rx="2"></rect><circle cx="12" cy="5" r="2"></circle><path d="M12 7v4"></path></svg>' : '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>'}
                    ${isAI ? 'AI Opportunity' : 'Manual Writing Tip'}
                </h5>
                <p class="text-sm text-slate-600 leading-relaxed">
                    ${isAI ? 'For this step, you are required to use AI. Tip: Document your prompt now and take a screenshot of the output.' : 'Focus on "Plain English" and readability. Break up long blocks of text with bullet points.'}
                </p>
            `;
            area.appendChild(tipDiv);
        }

        // Specific handling for first step (AI Buttons)
        if (currentStep === 0) {
            updateAIButtons();
        }

        // Specific handling for submission step (Checklist)
        if (currentStep === steps.length - 1) {
            renderChecklist();
        }

        updateNavButtons();
    }

    function selectAI(opt) {
        aiOption = opt;
        const display = document.getElementById('active-mode-display');
        if (opt === 'with_ai') {
            display.innerHTML = `<div class="flex items-center gap-2 text-purple-600"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="10" rx="2"></rect><circle cx="12" cy="5" r="2"></circle><path d="M12 7v4"></path></svg><span class="font-bold text-sm">AI Assisted Path</span></div>`;
        } else {
            display.innerHTML = `<div class="flex items-center gap-2 text-indigo-600"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg><span class="font-bold text-sm">Manual Path</span></div>`;
        }
        updateAIButtons();
        updateNavButtons();
        renderNav();
    }

    function updateAIButtons() {
        const btnM = document.getElementById('btn-manual');
        const btnA = document.getElementById('btn-ai');
        const iconM = document.getElementById('icon-manual');
        const iconA = document.getElementById('icon-ai');

        if (!btnM || !btnA) return;

        btnM.className = `p-6 border-2 rounded-xl transition-all text-left ${aiOption === 'without_ai' ? 'border-indigo-600 bg-indigo-50 ring-2 ring-indigo-200' : 'border-slate-200 hover:border-indigo-300'}`;
        btnA.className = `p-6 border-2 rounded-xl transition-all text-left ${aiOption === 'with_ai' ? 'border-purple-600 bg-purple-50 ring-2 ring-purple-200' : 'border-slate-200 hover:border-purple-300'}`;
        
        iconM.className.baseVal = `w-8 h-8 ${aiOption === 'without_ai' ? 'text-indigo-600' : 'text-slate-400'}`;
        iconA.className.baseVal = `w-8 h-8 ${aiOption === 'with_ai' ? 'text-purple-600' : 'text-slate-400'}`;
    }

    function renderChecklist() {
        const list = document.getElementById('checklist-items');
        const bonus = document.getElementById('ai-bonus-info');
        if (!list) return;

        let items = [
            "Decision regarding AI tools documented",
            "Three customer personas included",
            "Website link (4 pages) working",
            "Four promotional messages documented",
            "Peer feedback evidence included"
        ];

        if (aiOption === 'with_ai') {
            items.push("AI Usage Report (300-350 words)");
            items.push("AI Prompting Learning Reflection (300 words)");
            items.push("AI Process Reflection (300 words)");
            bonus.classList.remove('hidden');
        } else {
            bonus.classList.add('hidden');
        }

        list.innerHTML = items.map(item => `
            <label class="flex items-center space-x-2 p-2 hover:bg-slate-50 rounded cursor-pointer">
                <input type="checkbox" class="rounded text-indigo-600">
                <span>${item}</span>
            </label>
        `).join('');
    }

    function updateNavButtons() {
        const prev = document.getElementById('prev-btn');
        const next = document.getElementById('next-btn');
        const badge = document.getElementById('completion-badge');
        const tooltip = document.getElementById('next-tooltip');

        prev.disabled = currentStep === 0;
        prev.className = `flex items-center gap-2 px-4 py-2 text-sm font-bold transition-all ${currentStep === 0 ? 'text-slate-300 cursor-not-allowed' : 'text-indigo-600 hover:bg-indigo-50 rounded-lg'}`;

        // Disable NEXT on step 0 if no option selected
        const isStepZeroLocked = currentStep === 0 && !aiOption;
        next.disabled = isStepZeroLocked;
        
        if (isStepZeroLocked) {
            tooltip.classList.remove('hidden');
        } else {
            tooltip.classList.add('hidden');
        }

        if (currentStep < steps.length - 1) {
            next.classList.remove('hidden');
            badge.classList.add('hidden');
        } else {
            next.classList.add('hidden');
            badge.classList.remove('hidden');
        }
    }

    function goToStep(idx) {
        // Validation: Block navigation away from step 0 if no AI choice made
        if (currentStep === 0 && !aiOption && idx > 0) {
            return;
        }
        currentStep = idx;
        renderNav();
        renderContent();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function nextStep() {
        if (currentStep < steps.length - 1) {
            // Check if step 0 is completed
            if (currentStep === 0 && !aiOption) {
                return;
            }
            goToStep(currentStep + 1);
        }
    }

    function prevStep() {
        if (currentStep > 0) goToStep(currentStep - 1);
    }

    function toggleSidebar() {
        const sidebar = document.getElementById('sidebar');
        sidebar.classList.toggle('-translate-x-full');
    }

    // Init
    renderNav();
    renderContent();
</script>

</body>
</html>
